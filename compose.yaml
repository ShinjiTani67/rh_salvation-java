version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: rh-postgres
    restart: always
    environment:
      POSTGRES_DB: rhdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rh-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rhdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: rh-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rhdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8083:8080"
    networks:
      - rh-net

volumes:
  postgres_data:

networks:
  rh-net:
    driver: bridge